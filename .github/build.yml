name: Build MyVLESS APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install SDK packages
        run: |
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true
      - name: Create resources
        run: |
          mkdir -p app/src/main/res/values app/src/main/res/mipmap-anydpi-v26
          for size in hdpi mdpi xhdpi xxhdpi xxxhdpi; do mkdir -p app/src/main/res/mipmap-$size; done
          echo '<?xml version="1.0" encoding="utf-8"?><resources><color name="ic_launcher_background">#1B5E20</color></resources>' > app/src/main/res/values/colors.xml
          echo '<?xml version="1.0" encoding="utf-8"?><adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@color/ic_launcher_background"/><foreground android:drawable="#FFFFFF"/></adaptive-icon>' > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          for size in hdpi mdpi xhdpi xxhdpi xxxhdpi; do cp app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml app/src/main/res/mipmap-$size/ic_launcher.xml 2>/dev/null; done
          echo " " > app/proguard-rules.pro
      - name: Build APK
        run: ./gradlew assembleRelease --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyVLESS-APK
          path: app/build/outputs/apk/release/app-release-unsigned.apk